spring.application.name=CarRrental
#spring.datasource.url=jdbc:postgresql://carrentaldentifier.cx2kas2q6div.us-east-2.rds.amazonaws.com/carrentaldb

#spring.datasource.username=CaradminDb
#spring.datasource.password=yash1234
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

# --- JPA ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
#spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# (Optional) keep logs readable
logging.level.org.hibernate.SQL=DEBUG

app.jwt.secret=${JWT_SECRET}
app.jwt.expiryMinutes=60


# Gmail SMTP
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PSWD}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# (optional) helpful for debugging
logging.level.org.springframework.mail=DEBUG
logging.level.org.apache.commons.mail=DEBUG