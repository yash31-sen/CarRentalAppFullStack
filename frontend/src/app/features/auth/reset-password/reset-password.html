<div class="auth-container">
  <div class="auth-card">
    <h2>Choose New Password</h2>
    <p style="color: var(--text-muted); font-size: 14px; margin-bottom: 24px;">
      Enter your new password below to reset your credentials.
    </p>

    <div *ngIf="!token" class="error" style="margin-bottom: 20px;">
      ⚠️ Missing reset token. Please check the link in your email.
    </div>

    <form *ngIf="token" [formGroup]="resetForm" (ngSubmit)="submit()">
      <div class="form-group">
        <input type="password" formControlName="password" placeholder="New Password" />
        <div *ngIf="resetForm.get('password').touched && resetForm.get('password').invalid" class="error" style="text-align: left; font-size: 12px; margin-top: 5px;">
          Password must be at least 6 characters long.
        </div>
      </div>

      <div class="form-group">
        <input type="password" formControlName="confirmPassword" placeholder="Confirm Password" />
        <div *ngIf="resetForm.get('confirmPassword').touched && resetForm.hasError('mismatch')" class="error" style="text-align: left; font-size: 12px; margin-top: 5px;">
          Passwords do not match.
        </div>
      </div>

      <button type="submit" [disabled]="resetForm.invalid || loading">
        {{ loading ? 'Saving password...' : 'Update Password' }}
      </button>
    </form>

    <!-- Error Messages -->
    <p class="error" *ngIf="errorMessage">{{ errorMessage }}</p>

    <div class="auth-helper">
      Back to <a routerLink="/login">Login</a>
    </div>
  </div>
</div>
