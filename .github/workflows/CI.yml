name: CI Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build with Maven
        run: mvn clean install -DskipTests

      - name: Build Docker Image
        run: docker build -t car-rental-app .

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
            username: ${{ secrets.DOCKER_USERNAME }}
            password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/car-rental-app .

      - name: Push Docker Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/car-rental-app

  deploy:
      runs-on: ubuntu-latest
      needs: build

      steps:

        - name: Debug - Starting Deploy Job
          run: echo "Deploy job started"

        - name: Debug - Check variables presence
          run: |
            echo "EC2_HOST is set"
            echo "EC2_USER is set"
            echo "SSH key length:"
            echo "${#EC2_SSH_KEY}"
          env:
            EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}

        - name: Debug - Try SSH Connection
          uses: appleboy/ssh-action@v0.1.10
          with:
            host: ${{ secrets.EC2_HOST }}
            username: ${{ secrets.EC2_USER }}
            key: ${{ secrets.EC2_SSH_KEY }}
            port: 22
            debug: true
            script: |
              echo "SSH Connected Successfully"
              whoami
              pwd
        - name: Debug key length
          run: echo "Key length is ${#EC2_SSH_KEY}"
          env:
            EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        - name: Deploy to EC2
          uses: appleboy/ssh-action@v0.1.10
          with:
            host: ${{ secrets.EC2_HOST }}
            username: ${{ secrets.EC2_USER }}
            key: ${{ secrets.EC2_SSH_KEY }}
            script: |
              echo "Moving to project directory"
              cd ~/car-rental
  
              echo "Pulling latest image"
              docker pull ${{ secrets.DOCKER_USERNAME }}/car-rental-app
  
              echo "Stopping old containers"
              docker compose down
  
              echo "Starting new containers"
              docker compose up -d
  
              echo "Deployment done"